<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>걱정 들어주는 러버덕 3D · Worry Duck</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: "Segoe UI", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
    #app { width: 100%; height: 100vh; display: block; cursor: grab; }
    #app:active { cursor: grabbing; }

    .title {
      position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
      color: #7a4a10; font-weight: 800; font-size: clamp(15px, 4vw, 22px);
      text-shadow: 0 2px 8px rgba(255,240,200,.7); z-index: 10; letter-spacing: .5px;
    }

    /* 말풍선 */
    .bubble {
      position: fixed; top: 16%; left: 50%; transform: translateX(-50%);
      max-width: min(420px, 84vw);
      background: #fff; color: #5a4632; font-size: clamp(14px, 3.2vw, 18px);
      font-weight: 600; line-height: 1.5; text-align: center;
      padding: 14px 20px; border-radius: 22px;
      box-shadow: 0 12px 28px rgba(120,70,20,.22); z-index: 11; min-height: 1em;
    }
    .bubble::after {
      content: ""; position: absolute; bottom: -12px; left: 50%;
      transform: translateX(-50%); border: 12px solid transparent; border-top-color: #fff;
    }
    .bubble.pop { animation: bpop .4s cubic-bezier(.34,1.56,.64,1); }
    @keyframes bpop { 0%{transform:translateX(-50%) scale(.6);opacity:.3;} 100%{transform:translateX(-50%) scale(1);opacity:1;} }

    /* 하단 패널 */
    .panel {
      position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%);
      width: min(520px, 94vw); z-index: 12;
      display: flex; flex-direction: column; gap: 10px;
    }
    .quick { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
    .chip {
      border: none; cursor: pointer; background: rgba(255,255,255,.9); color: #8a5a25;
      font-weight: 700; font-size: clamp(12px, 2.8vw, 14px); padding: 9px 14px;
      border-radius: 18px; box-shadow: 0 3px 10px rgba(120,70,20,.14);
      transition: transform .12s ease, background .2s ease;
    }
    .chip:hover { transform: translateY(-2px); background: #fff; }
    .inputbar {
      display: flex; gap: 8px; background: #fff; padding: 8px 8px 8px 18px;
      border-radius: 26px; box-shadow: 0 8px 24px rgba(120,70,20,.18);
    }
    .inputbar input {
      flex: 1; border: none; outline: none; font-size: clamp(14px, 3.2vw, 16px);
      color: #4a3a28; background: transparent;
    }
    .inputbar input::placeholder { color: #c2ab90; }
    .send {
      border: none; cursor: pointer; background: linear-gradient(180deg,#ffd24d,#ffb000);
      color: #7a4a00; font-weight: 800; font-size: 15px; padding: 0 20px; border-radius: 20px;
      transition: transform .12s ease, filter .2s ease;
    }
    .send:hover { filter: brightness(1.05); }
    .send:active { transform: scale(.94); }
    .mic {
      border: none; cursor: pointer; background: #fff3d6; color: #b06a00;
      font-size: 16px; min-width: 42px; border-radius: 20px; flex: 0 0 auto;
      transition: background .2s ease, transform .12s ease;
    }
    .mic:hover { background: #ffe6ad; }
    .mic:active { transform: scale(.94); }
    .mic.rec { background: #ff5a5a; color: #fff; animation: micpulse 1s ease-in-out infinite; }
    @keyframes micpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(255,90,90,.55); }
      50%     { box-shadow: 0 0 0 9px rgba(255,90,90,0); }
    }
    .colorBtn {
      position: fixed; top: 16px; right: 16px; z-index: 12;
      border: none; cursor: pointer; background: rgba(255,255,255,.9); color: #8a5a25;
      font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 18px;
      box-shadow: 0 3px 10px rgba(120,70,20,.14);
    }

    /* 투두 팝업 */
    .modal-back {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(60,35,10,.45); backdrop-filter: blur(3px);
      display: flex; align-items: center; justify-content: center;
      animation: fade .2s ease;
    }
    .modal-back[hidden] { display: none; }
    @keyframes fade { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: min(420px, 92vw); max-height: 80vh; display: flex; flex-direction: column;
      background: #fffdf8; border-radius: 22px; overflow: hidden;
      box-shadow: 0 24px 60px rgba(60,35,10,.4);
      animation: rise .28s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes rise { from { transform: translateY(24px) scale(.95); opacity:.4; } to { transform: none; opacity:1; } }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; background: linear-gradient(180deg,#ffd24d,#ffb000);
      color: #6a3f00; font-weight: 800; font-size: 18px;
    }
    .modal-head .x {
      border: none; background: rgba(255,255,255,.5); cursor: pointer;
      width: 30px; height: 30px; border-radius: 50%; font-size: 18px; color: #6a3f00; font-weight: 800;
    }
    .todo-add { display: flex; gap: 8px; padding: 14px 18px 8px; }
    .todo-add input {
      flex: 1; border: 2px solid #f0e2c8; border-radius: 14px; padding: 10px 14px;
      font-size: 15px; outline: none; color: #4a3a28;
    }
    .todo-add input:focus { border-color: #ffc23d; }
    .todo-add button {
      border: none; cursor: pointer; background: #ffb000; color: #6a3f00;
      font-weight: 800; padding: 0 18px; border-radius: 14px;
    }
    .todo-list { list-style: none; overflow-y: auto; padding: 6px 12px 6px; margin: 0; }
    .todo-list li {
      display: flex; align-items: center; gap: 10px; padding: 10px 10px;
      border-radius: 12px; transition: background .15s ease;
    }
    .todo-list li:hover { background: #fbf2dd; }
    .todo-list .chk {
      width: 22px; height: 22px; flex: 0 0 auto; border-radius: 7px; cursor: pointer;
      border: 2px solid #e0b864; display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: #fff; background: #fff;
    }
    .todo-list li.done .chk { background: #ffb000; border-color: #ffb000; }
    .todo-list .txt { flex: 1; font-size: 15px; color: #4a3a28; word-break: break-all; }
    .todo-list li.done .txt { text-decoration: line-through; color: #b3a48e; }
    .todo-list .del {
      border: none; background: transparent; cursor: pointer; color: #cbb89a;
      font-size: 18px; font-weight: 800; padding: 2px 6px;
    }
    .todo-list .del:hover { color: #e23b3b; }
    .todo-empty { text-align: center; color: #bdab8e; padding: 22px 10px; font-size: 14px; }
    .modal-foot {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 18px 16px; border-top: 1px solid #f0e6d2;
    }
    .modal-foot span { color: #8a6b3d; font-weight: 700; font-size: 14px; }
    .modal-foot button {
      border: none; cursor: pointer; background: #f3e7cd; color: #8a5a25;
      font-weight: 700; font-size: 13px; padding: 8px 12px; border-radius: 14px;
    }
    .modal-foot button:hover { background: #ecdcb8; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="app"></canvas>
  <div class="title">🦆 표독비서 — 다 던져버리는 러버덕</div>
  <button class="colorBtn" id="colorBtn">색 바꾸기 🎨</button>

  <div class="bubble pop" id="bubble"><span id="bubbleText">왔어? 오늘은 또 뭐가 그렇게 하기 싫어서 왔니. 말해봐. 꽥.</span></div>

  <div class="panel">
    <div class="quick" id="quick">
      <button class="chip" data-mood="rebel">하기 싫어 😤</button>
      <button class="chip" data-mood="dump">다 던져버려 🗑️</button>
      <button class="chip" data-mood="excuse">핑계 대줘 😏</button>
      <button class="chip" data-mood="roast">팩폭 해줘 🔥</button>
      <button class="chip" id="todoBtn">할 일 보기 📋</button>
    </div>
    <form class="inputbar" id="form">
      <input id="msg" type="text" maxlength="120" autocomplete="off" placeholder="뭐가 그렇게 하기 싫어? 말해봐…" />
      <button class="mic" id="micMsg" type="button" title="음성으로 말하기" aria-label="음성 입력">🎤</button>
      <button class="send" type="submit">꽥!</button>
    </form>
  </div>

  <!-- 투두리스트 팝업 -->
  <div class="modal-back" id="todoModal" hidden>
    <div class="modal">
      <div class="modal-head">
        <span>📋 내 할 일</span>
        <button class="x" id="todoClose" aria-label="닫기">×</button>
      </div>
      <form class="todo-add" id="todoForm">
        <input id="todoInput" type="text" maxlength="80" autocomplete="off" placeholder="할 일을 추가… (Enter)" />
        <button class="mic" id="micTodo" type="button" title="음성으로 추가" aria-label="음성 입력">🎤</button>
        <button type="submit">추가</button>
      </form>
      <ul class="todo-list" id="todoList"></ul>
      <div class="modal-foot">
        <span id="todoCount">0개 남음</span>
        <button id="todoClear">완료 항목 비우기</button>
      </div>
    </div>
  </div>

  <script type="module" src="duck3d.js"></script>
</body>
</html>
